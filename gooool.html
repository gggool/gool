<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>ESTADIO APUESTA - INAUGURAL</title>

<style>
    :root {
        --gold: #FFD700;
        --green: #4ade80;
    }

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    body{
        font-family:'Segoe UI', Arial, sans-serif;
        height:100vh;
        background:#000;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        overflow:hidden;
        position:fixed;
        width:100%;
    }

    .bg-stadium{
        position:fixed;
        inset:0;
        background:
            linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)),
            url('https://i.ibb.co/Cty52yx/Whats-App-Image-2024-12-11-at-9-33-34-PM.jpg');
        background-size:cover;
        background-position:center;
        transition:transform 1.2s ease, filter 1.2s ease;
        z-index:-1;
    }

    .entering .bg-stadium{
        transform:scale(1.15);
        filter:blur(3px);
    }

    .container{
        width:100%;
        max-width:500px;
        padding:16px;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .step{
        display:none;
        opacity:0;
        transform:translateY(20px);
        transition:opacity 0.5s ease, transform 0.5s ease;
    }

    .step.active{
        display:block;
        opacity:1;
        transform:translateY(0);
    }

    .step.fade-out {
        opacity: 0;
        transform: scale(0.97);
        pointer-events: none;
        transition: opacity 0.45s ease, transform 0.45s ease;
    }

    /* SPLASH SCREEN */
    .splash-content {
        text-align: center;
        animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    
    .loader-ball {
        display: flex;
        justify-content: center;
        gap: 10px;
        font-size: 3.5rem;
    }
    
    .loader-ball span {
        display: inline-block;
        animation: bounce 0.6s infinite alternate;
    }
    
    .loader-ball span:first-child {
        animation-delay: 0s;
    }
    
    .loader-ball span:last-child {
        animation-delay: 0.3s;
    }
    
    @keyframes bounce {
        from { transform: translateY(0); }
        to { transform: translateY(-25px); }
    }
    
    .loader-bar {
        width: 200px;
        height: 6px;
        background: rgba(255,255,255,0.2);
        border-radius: 999px;
        margin: 20px auto 0;
        overflow: hidden;
    }
    
    .loader-fill {
        height: 100%;
        width: 0%;
        background: var(--gold);
        border-radius: 999px;
        animation: fill 2s ease forwards;
    }
    
    @keyframes fill {
        from { width: 0%; }
        to { width: 100%; }
    }

    /* HERO */
    .hero-overlay{
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        border-radius: 30px;
        padding: 25px 20px;
        text-align: center;
        border: 1px solid rgba(255,215,0,0.15);
        position: relative;
    }

    /* Esquina superior izquierda - EN VIVO */
    .live-badge-corner {
        position: absolute;
        top: 15px;
        left: 20px;
        background: #ff2d2d;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 700;
        animation: pulse 1.5s infinite;
        z-index: 1;
    }
    
    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* Selector de idioma - arriba del todo */
    .lang-selector {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 20px;
        margin-top: 5px;
    }
    
    .lang-btn {
        width: auto;
        padding: 4px 10px;
        font-size: 0.65rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        color: #aaa;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .lang-btn.active-lang {
        background: rgba(255,215,0,0.2);
        border-color: var(--gold);
        color: var(--gold);
    }

    .match-box{
        margin: 20px 0 15px;
    }

    .team{
        font-size: 1.8rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: white;
        text-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .vs-divider{
        color: var(--gold);
        font-size: 1rem;
        font-weight: bold;
        margin: 10px 0;
        letter-spacing: 4px;
    }

    .hero-question{
        margin: 15px 0 20px;
        font-size: 0.9rem;
        color: #ddd;
        font-weight: 600;
        background: rgba(0,0,0,0.4);
        display: inline-block;
        padding: 6px 16px;
        border-radius: 50px;
    }

    .social-proof{
        background: rgba(255,215,0,0.12);
        border: 1px solid rgba(255,215,0,0.25);
        border-radius: 50px;
        padding: 6px 14px;
        margin: 15px 0 12px;
        font-size: 0.75rem;
        color: var(--gold);
        display: inline-block;
    }

    button{
        width:100%;
        border:none;
        border-radius:999px;
        padding:14px;
        font-weight:800;
        cursor:pointer;
        transition:.2s ease;
        font-size: 0.95rem;
    }

    button:active{
        transform:scale(.97);
    }

    .btn-main{
        background:linear-gradient(95deg, var(--gold), #FFA500);
        color:black;
        margin-top:10px;
    }

    .btn-main:hover{
        opacity: 0.9;
    }

    .btn-whatsapp{
        background:#25D366;
        color:white;
        margin-bottom:10px;
    }

    .btn-secondary{
        background:rgba(255,255,255,.12);
        color:white;
    }

    .btn-secondary:hover{
        background:rgba(255,255,255,.2);
    }

    .game-card,
    .result-card{
        background:rgba(0,0,0,.85);
        backdrop-filter:blur(10px);
        border-radius:30px;
        padding:20px;
        border:1px solid rgba(255,215,0,.15);
    }

    .section-title{
        text-align:center;
        font-size:1.2rem;
        font-weight:800;
        color:var(--gold);
        margin-bottom:6px;
    }

    .section-subtitle{
        text-align:center;
        color:#999;
        font-size:.75rem;
        margin-bottom:18px;
    }

    .options-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .option-card{
        background:rgba(255,255,255,.05);
        border:2px solid rgba(255,215,0,.15);
        border-radius:20px;
        padding:12px 8px;
        text-align:center;
        cursor:pointer;
        transition:.2s ease;
    }

    .option-card:hover{
        transform:translateY(-2px);
        border-color:var(--gold);
    }

    .option-card.selected{
        border-color:var(--gold);
        background:rgba(255,215,0,.12);
    }

    .option-icon{
        font-size:1.5rem;
        margin-bottom:6px;
        color:white;
    }

    .option-card.selected .option-icon{
        color:var(--gold);
    }

    .option-name{
        font-size:.75rem;
        font-weight:700;
        margin-bottom:5px;
    }

    .price{
        display:block;
        font-size:1.4rem;
        font-weight:900;
        color:var(--gold);
    }

    .odds-info{
        margin-top:4px;
        font-size:.65rem;
        color:var(--green);
    }

    .dynamic-note{
        text-align:center;
        font-size:.6rem;
        color:#8f8f8f;
        margin:14px 0 6px;
    }

    .result-title{
        text-align:center;
        color:var(--gold);
        font-size:1.3rem;
        margin-bottom:14px;
    }

    .summary{
        background:rgba(255,255,255,.06);
        border-radius:20px;
        padding:14px;
        line-height:1.5;
        margin-bottom:16px;
        font-size:0.85rem;
    }

    .summary p{
        margin:6px 0;
    }

    /* CONFETTI */
    .confetti-piece {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        animation: confettiFall 1.2s ease forwards;
        pointer-events: none;
        z-index: 9999;
    }
    
    @keyframes confettiFall {
        0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media(max-width:500px){
        .container{
            padding:12px;
        }
        .option-card{
            padding:10px 5px;
        }
        .option-icon{
            font-size:1.3rem;
        }
        .price{
            font-size:1.2rem;
        }
        button{
            padding:12px;
            font-size:0.85rem;
        }
        .hero-overlay{
            padding: 20px 15px;
        }
        .team{
            font-size: 1.4rem;
        }
        .hero-question{
            font-size: 0.8rem;
        }
        .loader-ball {
            font-size: 2.5rem;
        }
        .live-badge-corner {
            top: 10px;
            left: 15px;
            font-size: 0.65rem;
            padding: 3px 10px;
        }
        .lang-selector {
            margin-bottom: 15px;
        }
        .lang-btn {
            padding: 3px 8px;
            font-size: 0.6rem;
        }
    }
</style>
</head>
<body>

<div class="bg-stadium"></div>

<div class="container">

    <!-- SPLASH SCREEN -->
    <div id="step-splash" class="step active">
        <div class="splash-content">
            <div class="loader-ball">
                <span>⚽</span>
                <span>🏆</span>
            </div>
            <p style="color:var(--gold); font-size:1rem; margin-top:20px; letter-spacing:2px;" id="splashText">
                CARGANDO ESTADIO
            </p>
            <div class="loader-bar">
                <div class="loader-fill"></div>
            </div>
            <p style="color:#888; font-size:0.7rem; margin-top:15px;">
                🃏 Coach Poker en vivo
            </p>
        </div>
    </div>

    <!-- PASO 0: HERO - MÉXICO vs SUDÁFRICA -->
    <div id="step-0" class="step">
        <div class="hero-overlay">
            <!-- EN VIVO en esquina superior izquierda -->
            <div class="live-badge-corner">
                🔴 EN VIVO
            </div>
            
            <!-- Selector de idioma - arriba a la derecha -->
            <div class="lang-selector">
                <button class="lang-btn active-lang" data-lang="es">🇪🇸 ES</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
                <button class="lang-btn" data-lang="pt">🇧🇷 PT</button>
            </div>
            
            <div class="match-box">
                <div class="team">🇲🇽 MÉXICO</div>
                <div class="vs-divider">VS</div>
                <div class="team">🇿🇦 SUDÁFRICA</div>
            </div>
            
            <div class="hero-question" id="heroQuestion">
                🤔 ¿QUIÉN MARCA +1.5 GOLES?
            </div>
            
            <div class="social-proof" id="socialCounter">
                🔥 7 personas ya eligieron una jugada
            </div>
            
            <button class="btn-main" id="enterBtn">
                ENTRAR AL ESTADIO
            </button>
        </div>
    </div>

    <!-- PASO 1: JUEGO -->
    <div id="step-1" class="step">
        <div class="game-card">
            <div class="section-title" id="gameTitle">
                ⚽ ¿Quién marca +1.5 goles?
            </div>
            <div class="section-subtitle" id="gameSubtitle">
                Lee el partido 🧠
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="dynamic-note">
                🔥 Precios dinámicos +3 / -1
            </div>
            <button class="btn-main" id="confirmBtn">
                CONFIRMAR
            </button>
        </div>
    </div>

    <!-- PASO 2: RESULTADO -->
    <div id="step-2" class="step">
        <div class="result-card">
            <div class="result-title" id="resultTitle">
                🎟️ APUESTA REGISTRADA
            </div>
            <div class="summary" id="summary"></div>
            <button class="btn-whatsapp" id="whatsappBtn">
                COMPRAR ENTRADA vía WhatsApp
            </button>
            <button class="btn-secondary" id="newBetBtn">
                NUEVA APUESTA
            </button>
        </div>
    </div>

</div>

<script>

/* =========================
   TEXTO POR IDIOMA
========================= */

const TEXTS = {
    es: {
        splashText: "CARGANDO ESTADIO",
        question: "🤔 ¿QUIÉN MARCA +1.5 GOLES?",
        enter: "ENTRAR AL ESTADIO",
        title: "⚽ ¿Quién marca +1.5 goles?",
        subtitle: "Lee el partido 🧠",
        confirm: "CONFIRMAR",
        whatsapp: "COMPRAR ENTRADA vía WhatsApp",
        newBet: "NUEVA APUESTA",
        resultTitle: "🎟️ APUESTA REGISTRADA",
        liveBadge: "🔴 EN VIVO"
    },
    en: {
        splashText: "LOADING STADIUM",
        question: "🤔 WHO SCORES +1.5 GOALS?",
        enter: "ENTER THE STADIUM",
        title: "⚽ Who scores +1.5 goals?",
        subtitle: "Read the match 🧠",
        confirm: "CONFIRM",
        whatsapp: "BUY TICKET via WhatsApp",
        newBet: "NEW BET",
        resultTitle: "🎟️ BET REGISTERED",
        liveBadge: "🔴 LIVE"
    },
    pt: {
        splashText: "CARREGANDO ESTÁDIO",
        question: "🤔 QUEM MARCA +1.5 GOLS?",
        enter: "ENTRAR NO ESTÁDIO",
        title: "⚽ Quem marca +1.5 gols?",
        subtitle: "Leia o jogo 🧠",
        confirm: "CONFIRMAR",
        whatsapp: "COMPRAR ENTRADA via WhatsApp",
        newBet: "NOVA APOSTA",
        resultTitle: "🎟️ APOSTA REGISTRADA",
        liveBadge: "🔴 AO VIVO"
    }
};

let currentLang = 'es';

function setLang(lang) {
    currentLang = lang;
    const t = TEXTS[lang];
    
    // Actualizar textos en la UI
    const splashTextEl = document.getElementById('splashText');
    const heroQuestionEl = document.getElementById('heroQuestion');
    const enterBtnEl = document.getElementById('enterBtn');
    const gameTitleEl = document.getElementById('gameTitle');
    const gameSubtitleEl = document.getElementById('gameSubtitle');
    const confirmBtnEl = document.getElementById('confirmBtn');
    const whatsappBtnEl = document.getElementById('whatsappBtn');
    const newBetBtnEl = document.getElementById('newBetBtn');
    const resultTitleEl = document.getElementById('resultTitle');
    const liveBadgeEl = document.querySelector('.live-badge-corner');
    
    if (splashTextEl) splashTextEl.textContent = t.splashText;
    if (heroQuestionEl) heroQuestionEl.textContent = t.question;
    if (enterBtnEl) enterBtnEl.textContent = t.enter;
    if (gameTitleEl) gameTitleEl.textContent = t.title;
    if (gameSubtitleEl) gameSubtitleEl.textContent = t.subtitle;
    if (confirmBtnEl) confirmBtnEl.textContent = t.confirm;
    if (whatsappBtnEl) whatsappBtnEl.textContent = t.whatsapp;
    if (newBetBtnEl) newBetBtnEl.textContent = t.newBet;
    if (resultTitleEl) resultTitleEl.textContent = t.resultTitle;
    if (liveBadgeEl) liveBadgeEl.textContent = t.liveBadge;
    
    // Resaltar botón activo
    document.querySelectorAll('.lang-btn').forEach(btn => {
        const isActive = btn.dataset.lang === lang;
        btn.style.background = isActive ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.08)';
        btn.style.borderColor = isActive ? 'var(--gold)' : 'rgba(255,255,255,0.2)';
        btn.style.color = isActive ? 'var(--gold)' : '#aaa';
    });
}

/* =========================
   CONFIGURACIÓN DEL PARTIDO INAUGURAL
   México vs Sudáfrica
   - México y Ninguno: $50 → premio $100
   - Sudáfrica y Ambos: $10 → premio $100
========================= */

const MATCH = {
    homeTeam: "🇲🇽 MÉXICO",
    awayTeam: "🇿🇦 SUDÁFRICA",
    prize: 100,
    whatsapp: "573016031886",
    prices: {
        home: 50,   // México - más probable → más caro
        none: 50,   // Ninguno - más probable → más caro
        away: 10,   // Sudáfrica - menos probable → más barato
        both: 10    // Ambos - menos probable → más barato
    }
};

/* =========================
   CONTADOR SOCIAL
========================= */

let betCounter = 7;

function updateSocialCounter() {
    const counterEl = document.getElementById('socialCounter');
    if (counterEl) {
        const text = currentLang === 'es' ? 'personas ya eligieron una jugada' : 
                     currentLang === 'en' ? 'people already made a bet' : 
                     'pessoas já escolheram uma jogada';
        counterEl.innerHTML = `🔥 ${betCounter} ${text}`;
    }
}

function incrementCounter() {
    betCounter++;
    updateSocialCounter();
}

/* =========================
   OPCIONES
========================= */

const OPTIONS = [
    { id:"home", icon:"🇲🇽", name:`SOLO ${MATCH.homeTeam}` },
    { id:"none", icon:"🔒", name:"NINGUNO" },
    { id:"away", icon:"🇿🇦", name:`SOLO ${MATCH.awayTeam}` },
    { id:"both", icon:"⚽⚽", name:"AMBOS" }
];

/* =========================
   PRECIOS DINÁMICOS
========================= */

let currentPrices = {
    home: MATCH.prices.home,
    none: MATCH.prices.none,
    away: MATCH.prices.away,
    both: MATCH.prices.both
};

let selectedOption = null;
let selectedPrice = null;

/* =========================
   PASOS
========================= */

function showStep(step){
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    const targetStep = document.getElementById(`step-${step}`);
    if(targetStep) targetStep.classList.add('active');
}

/* =========================
   SPLASH SCREEN - Transición suave
========================= */

function hideSplashAndShowHero() {
    const splash = document.getElementById('step-splash');
    splash.classList.add('fade-out');
    setTimeout(() => {
        showStep(0);
    }, 450);
}

/* =========================
   ENTRAR AL ESTADIO
========================= */

function enterStadium(){
    document.body.classList.add('entering');
    setTimeout(() => {
        showStep(1);
        document.body.classList.remove('entering');
    }, 600);
}

/* =========================
   MERCADO DINÁMICO
========================= */

function updatePricesAfterBet(optionId){
    let newPrices = {...currentPrices};
    newPrices[optionId] += 3;
    for(let opt of OPTIONS){
        if(opt.id !== optionId){
            newPrices[opt.id] -= 1;
        }
    }
    for(let key in newPrices){
        if(newPrices[key] < 3) newPrices[key] = 3;
        if(newPrices[key] > 80) newPrices[key] = 80; // Máximo más alto por los $50
    }
    currentPrices = newPrices;
}

/* =========================
   CONFETTI
========================= */

function launchConfetti() {
    const colors = ['#FFD700','#FFA500','#4ade80','#fff','#ff6b6b'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-10px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = Math.random() * 0.4 + 's';
        el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1600);
    }
}

/* =========================
   RENDERIZAR OPCIONES
========================= */

function renderOptions(){
    const grid = document.getElementById('optionsGrid');
    if(!grid) return;
    grid.innerHTML = '';
    
    for(let opt of OPTIONS){
        const price = currentPrices[opt.id];
        const isSelected = selectedOption && selectedOption.id === opt.id;
        const card = document.createElement('div');
        card.className = `option-card ${isSelected ? 'selected' : ''}`;
        card.innerHTML = `
            <div class="option-icon">${opt.icon}</div>
            <div class="option-name">${opt.name}</div>
            <span class="price">$${price}</span>
            <div class="odds-info">🏆 Gana $${MATCH.prize}</div>
        `;
        card.addEventListener('click', () => {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedOption = opt;
            selectedPrice = price;
            
            // Vibración táctil (móvil)
            if (navigator.vibrate) navigator.vibrate(25);
            
            // Flash visual de confirmación
            card.style.transform = 'scale(1.06)';
            setTimeout(() => card.style.transform = '', 150);
        });
        grid.appendChild(card);
    }
}

/* =========================
   CONFIRMAR
========================= */

function confirmBet(){
    if(!selectedOption){
        alert("⚠️ Selecciona una jugada antes de confirmar");
        return;
    }
    
    updatePricesAfterBet(selectedOption.id);
    incrementCounter();
    launchConfetti();
    
    const summary = document.getElementById('summary');
    summary.innerHTML = `
        <p><strong>⚽ Evento:</strong> ${MATCH.homeTeam} vs ${MATCH.awayTeam}</p>
        <p><strong>🎯 Jugada:</strong> ${selectedOption.icon} ${selectedOption.name}</p>
        <p><strong>💰 Entrada:</strong> $${selectedPrice}</p>
        <p><strong>🏆 Premio:</strong> $${MATCH.prize}</p>
        <p style="margin-top:12px; font-size:0.75rem; color:#FFD700;">
            📊 La opción subió a <strong>$${currentPrices[selectedOption.id]}</strong>
        </p>
        <p style="font-size:0.65rem; color:#aaa;">⚡ Las otras opciones bajaron -$1</p>
    `;
    
    window.betData = {
        icon: selectedOption.icon,
        name: selectedOption.name,
        price: selectedPrice,
        prize: MATCH.prize
    };
    
    showStep(2);
}

/* =========================
   WHATSAPP
========================= */

function sendWhatsApp(){
    const data = window.betData;
    if(!data) return;
    const msg = `🎟️ *ESTADIO APUESTA - INAUGURAL* 🎟️%0A%0A` +
                `⚽ ${MATCH.homeTeam} vs ${MATCH.awayTeam}%0A` +
                `🎯 ${data.icon} ${data.name}%0A` +
                `💰 Entrada: $${data.price}%0A` +
                `🏆 Premio: $${data.prize}`;
    window.open(`https://wa.me/${MATCH.whatsapp}?text=${msg}`, '_blank');
}

/* =========================
   REINICIAR
========================= */

function resetGame(){
    currentPrices = {
        home: MATCH.prices.home,
        none: MATCH.prices.none,
        away: MATCH.prices.away,
        both: MATCH.prices.both
    };
    selectedOption = null;
    selectedPrice = null;
    renderOptions();
    showStep(1);
}

/* =========================
   EVENTOS
========================= */

document.getElementById('enterBtn').addEventListener('click', enterStadium);
document.getElementById('confirmBtn').addEventListener('click', confirmBet);
document.getElementById('whatsappBtn').addEventListener('click', sendWhatsApp);
document.getElementById('newBetBtn').addEventListener('click', resetGame);

// Eventos de idioma
document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        setLang(btn.dataset.lang);
    });
});

/* =========================
   INICIALIZAR
========================= */

renderOptions();
updateSocialCounter();
setLang('es');

// Ocultar splash después de 2.2 segundos y mostrar Hero
setTimeout(() => {
    hideSplashAndShowHero();
}, 2200);

</script>
</body>
</html>
