<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>ESTADIO APUESTA - AMISTOSO</title>

<style>
    :root {
        --gold: #FFD700;
        --green: #4ade80;
    }

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        /* Evita selección de texto en toda la app */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    body{
        font-family:'Segoe UI', Arial, sans-serif;
        height:100vh;
        background:#000;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        overflow:hidden; /* Elimina el scroll */
        position:fixed;
        width:100%;
    }

    /* FONDO ESTADIO */
    .bg-stadium{
        position:fixed;
        inset:0;
        background:
            linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)),
            url('https://i.ibb.co/Cty52yx/Whats-App-Image-2024-12-11-at-9-33-34-PM.jpg');
        background-size:cover;
        background-position:center;
        transition:transform 1.2s ease, filter 1.2s ease;
        z-index:-1;
    }

    .entering .bg-stadium{
        transform:scale(1.15);
        filter:blur(3px);
    }

    .container{
        width:100%;
        max-width:500px;
        padding:16px;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .step{
        display:none;
        opacity:0;
        transform:translateY(20px);
        transition:.45s ease;
    }

    .step.active{
        display:block;
        opacity:1;
        transform:translateY(0);
    }

    /* HERO */
    .hero-overlay{
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        border-radius: 30px;
        padding: 30px 20px;
        text-align: center;
        border: 1px solid rgba(255,215,0,0.15);
    }

    .live-badge{
        display:inline-block;
        background:#ff2d2d;
        padding:6px 14px;
        border-radius:999px;
        font-size:.75rem;
        font-weight:700;
        margin-bottom:15px;
    }

    .match-box{
        margin: 15px 0;
    }

    .team{
        font-size: 1.8rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: white;
        text-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .vs-divider{
        color: var(--gold);
        font-size: 1rem;
        font-weight: bold;
        margin: 10px 0;
        letter-spacing: 4px;
    }

    .hero-question{
        margin: 15px 0 20px;
        font-size: 0.9rem;
        color: #ddd;
        font-weight: 600;
        background: rgba(0,0,0,0.4);
        display: inline-block;
        padding: 6px 16px;
        border-radius: 50px;
    }

    /* PRUEBA SOCIAL - CONTADOR */
    .social-proof{
        background: rgba(255,215,0,0.12);
        border: 1px solid rgba(255,215,0,0.25);
        border-radius: 50px;
        padding: 6px 14px;
        margin: 15px 0 12px;
        font-size: 0.75rem;
        color: var(--gold);
        display: inline-block;
    }

    /* BOTONES */
    button{
        width:100%;
        border:none;
        border-radius:999px;
        padding:14px;
        font-weight:800;
        cursor:pointer;
        transition:.2s ease;
        font-size: 0.95rem;
    }

    button:active{
        transform:scale(.97);
    }

    .btn-main{
        background:linear-gradient(95deg, var(--gold), #FFA500);
        color:black;
        margin-top:10px;
    }

    .btn-main:hover{
        opacity: 0.9;
    }

    .btn-whatsapp{
        background:#25D366;
        color:white;
        margin-bottom:10px;
    }

    .btn-secondary{
        background:rgba(255,255,255,.12);
        color:white;
    }

    .btn-secondary:hover{
        background:rgba(255,255,255,.2);
    }

    /* CARD DEL JUEGO */
    .game-card,
    .result-card{
        background:rgba(0,0,0,.85);
        backdrop-filter:blur(10px);
        border-radius:30px;
        padding:20px;
        border:1px solid rgba(255,215,0,.15);
    }

    .section-title{
        text-align:center;
        font-size:1.2rem;
        font-weight:800;
        color:var(--gold);
        margin-bottom:6px;
    }

    .section-subtitle{
        text-align:center;
        color:#999;
        font-size:.75rem;
        margin-bottom:18px;
    }

    /* OPCIONES */
    .options-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .option-card{
        background:rgba(255,255,255,.05);
        border:2px solid rgba(255,215,0,.15);
        border-radius:20px;
        padding:12px 8px;
        text-align:center;
        cursor:pointer;
        transition:.2s ease;
    }

    .option-card:hover{
        transform:translateY(-2px);
        border-color:var(--gold);
    }

    .option-card.selected{
        border-color:var(--gold);
        background:rgba(255,215,0,.12);
    }

    .option-icon{
        font-size:1.5rem;
        margin-bottom:6px;
        color:white;
    }

    .option-card.selected .option-icon{
        color:var(--gold);
    }

    .option-name{
        font-size:.75rem;
        font-weight:700;
        margin-bottom:5px;
    }

    .price{
        display:block;
        font-size:1.4rem;
        font-weight:900;
        color:var(--gold);
    }

    .odds-info{
        margin-top:4px;
        font-size:.65rem;
        color:var(--green);
    }

    .dynamic-note{
        text-align:center;
        font-size:.6rem;
        color:#8f8f8f;
        margin:14px 0 6px;
    }

    /* RESULTADO */
    .result-title{
        text-align:center;
        color:var(--gold);
        font-size:1.3rem;
        margin-bottom:14px;
    }

    .summary{
        background:rgba(255,255,255,.06);
        border-radius:20px;
        padding:14px;
        line-height:1.5;
        margin-bottom:16px;
        font-size:0.85rem;
    }

    .summary p{
        margin:6px 0;
    }

    /* MOBILE */
    @media(max-width:500px){
        .container{
            padding:12px;
        }
        .option-card{
            padding:10px 5px;
        }
        .option-icon{
            font-size:1.3rem;
        }
        .price{
            font-size:1.2rem;
        }
        button{
            padding:12px;
            font-size:0.85rem;
        }
        .hero-overlay{
            padding: 25px 15px;
        }
        .team{
            font-size: 1.4rem;
        }
        .hero-question{
            font-size: 0.8rem;
        }
    }
</style>
</head>
<body>

<div class="bg-stadium"></div>

<div class="container">

    <!-- PASO 0: HERO -->
    <div id="step-0" class="step active">
        <div class="hero-overlay">
            <div class="live-badge">
                🔴 EN VIVO
            </div>
            
            <div class="match-box">
                <div class="team">R. D. CONGO</div>
                <div class="vs-divider">VS</div>
                <div class="team">DINAMARCA</div>
            </div>
            
            <div class="hero-question">
                🤔 ¿QUIÉN MARCA +1.5 GOLES?
            </div>
            
            <!-- CONTADOR SOCIAL -->
            <div class="social-proof" id="socialCounter">
                🔥 7 personas ya eligieron una jugada
            </div>
            
            <button class="btn-main" id="enterBtn">
                ENTRAR AL ESTADIO
            </button>
        </div>
    </div>

    <!-- PASO 1: JUEGO -->
    <div id="step-1" class="step">
        <div class="game-card">
            <div class="section-title">
                ⚽ ¿Quién marca +1.5 goles?
            </div>
            <div class="section-subtitle">
                Lee el partido 🧠
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="dynamic-note">
                🔥 Precios dinámicos +3 / -1
            </div>
            <button class="btn-main" id="confirmBtn">
                CONFIRMAR
            </button>
        </div>
    </div>

    <!-- PASO 2: RESULTADO -->
    <div id="step-2" class="step">
        <div class="result-card">
            <div class="result-title">
                🎟️ APUESTA REGISTRADA
            </div>
            <div class="summary" id="summary"></div>
            <button class="btn-whatsapp" id="whatsappBtn">
                COMPRAR ENTRADA vía WhatsApp
            </button>
            <button class="btn-secondary" id="newBetBtn">
                NUEVA APUESTA
            </button>
        </div>
    </div>

</div>

<script>

/* =========================
   CONFIGURACIÓN DEL PARTIDO
========================= */

const MATCH = {
    homeTeam: "R. D. CONGO",
    awayTeam: "DINAMARCA",
    prize: 30,
    whatsapp: "573016031886",
    prices: {
        home: 3,
        none: 15,
        away: 3,
        both: 15
    }
};

/* =========================
   CONTADOR SOCIAL
========================= */

let betCounter = 7;

function updateSocialCounter() {
    const counterEl = document.getElementById('socialCounter');
    if (counterEl) {
        counterEl.innerHTML = `🔥 ${betCounter} personas ya eligieron una jugada`;
    }
}

function incrementCounter() {
    betCounter++;
    updateSocialCounter();
}

/* =========================
   OPCIONES
========================= */

const OPTIONS = [
    { id:"home", icon:"🇨🇩", name:`SOLO ${MATCH.homeTeam}` },
    { id:"none", icon:"🔒", name:"NINGUNO" },
    { id:"away", icon:"🇩🇰", name:`SOLO ${MATCH.awayTeam}` },
    { id:"both", icon:"⚽⚽", name:"AMBOS" }
];

/* =========================
   PRECIOS DINÁMICOS
========================= */

let currentPrices = {
    home: MATCH.prices.home,
    none: MATCH.prices.none,
    away: MATCH.prices.away,
    both: MATCH.prices.both
};

let selectedOption = null;
let selectedPrice = null;

/* =========================
   PASOS
========================= */

function showStep(step){
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(`step-${step}`).classList.add('active');
}

/* =========================
   ENTRAR AL ESTADIO
========================= */

function enterStadium(){
    document.body.classList.add('entering');
    setTimeout(() => {
        showStep(1);
        document.body.classList.remove('entering');
    }, 600);
}

/* =========================
   MERCADO DINÁMICO
========================= */

function updatePricesAfterBet(optionId){
    let newPrices = {...currentPrices};
    newPrices[optionId] += 3;
    for(let opt of OPTIONS){
        if(opt.id !== optionId){
            newPrices[opt.id] -= 1;
        }
    }
    for(let key in newPrices){
        if(newPrices[key] < 3) newPrices[key] = 3;
        if(newPrices[key] > 28) newPrices[key] = 28;
    }
    currentPrices = newPrices;
}

/* =========================
   RENDERIZAR OPCIONES
========================= */

function renderOptions(){
    const grid = document.getElementById('optionsGrid');
    if(!grid) return;
    grid.innerHTML = '';
    
    for(let opt of OPTIONS){
        const price = currentPrices[opt.id];
        const isSelected = selectedOption && selectedOption.id === opt.id;
        const card = document.createElement('div');
        card.className = `option-card ${isSelected ? 'selected' : ''}`;
        card.innerHTML = `
            <div class="option-icon">${opt.icon}</div>
            <div class="option-name">${opt.name}</div>
            <span class="price">$${price}</span>
            <div class="odds-info">🏆 Gana $${MATCH.prize}</div>
        `;
        card.addEventListener('click', () => {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedOption = opt;
            selectedPrice = price;
        });
        grid.appendChild(card);
    }
}

/* =========================
   CONFIRMAR
========================= */

function confirmBet(){
    if(!selectedOption){
        alert("Selecciona una jugada");
        return;
    }
    
    updatePricesAfterBet(selectedOption.id);
    incrementCounter();
    
    const summary = document.getElementById('summary');
    summary.innerHTML = `
        <p><strong>⚽ Evento:</strong> ${MATCH.homeTeam} vs ${MATCH.awayTeam}</p>
        <p><strong>🎯 Jugada:</strong> ${selectedOption.icon} ${selectedOption.name}</p>
        <p><strong>💰 Entrada:</strong> $${selectedPrice}</p>
        <p><strong>🏆 Premio:</strong> $${MATCH.prize}</p>
        <p style="margin-top:12px; font-size:0.75rem; color:#FFD700;">
            📊 La opción subió a $${currentPrices[selectedOption.id]}
        </p>
    `;
    
    window.betData = {
        icon: selectedOption.icon,
        name: selectedOption.name,
        price: selectedPrice,
        prize: MATCH.prize
    };
    
    showStep(2);
}

/* =========================
   WHATSAPP
========================= */

function sendWhatsApp(){
    const data = window.betData;
    if(!data) return;
    const msg = `🎟️ *ESTADIO APUESTA* 🎟️%0A%0A` +
                `⚽ ${MATCH.homeTeam} vs ${MATCH.awayTeam}%0A` +
                `🎯 ${data.icon} ${data.name}%0A` +
                `💰 Entrada: $${data.price}%0A` +
                `🏆 Premio: $${data.prize}`;
    window.open(`https://wa.me/${MATCH.whatsapp}?text=${msg}`, '_blank');
}

/* =========================
   REINICIAR
========================= */

function resetGame(){
    currentPrices = {
        home: MATCH.prices.home,
        none: MATCH.prices.none,
        away: MATCH.prices.away,
        both: MATCH.prices.both
    };
    selectedOption = null;
    selectedPrice = null;
    renderOptions();
    showStep(1);
}

/* =========================
   EVENTOS
========================= */

document.getElementById('enterBtn').addEventListener('click', enterStadium);
document.getElementById('confirmBtn').addEventListener('click', confirmBet);
document.getElementById('whatsappBtn').addEventListener('click', sendWhatsApp);
document.getElementById('newBetBtn').addEventListener('click', resetGame);

/* =========================
   INICIALIZAR
========================= */

renderOptions();
updateSocialCounter();

</script>
</body>
</html>
